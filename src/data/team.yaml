members:
  - name: Phil Sturgeon
    role: Chair
    image: /team-phil.png
    imageAlt: ''
    bio: |
      Phil is a software engineer by trade, and the only person on the team
      without a dog. This might need to change. Phil grew up between Bristol and
      Bath, and moved to New York City to "make it big" in tech. After spending
      some time trying to save the world with a carpooling app, he ended up
      working for a company that sold expensive coworking spaces, and realised
      he wasn't doing much to help fight for the climate anymore.

      Escaping the concrete jungle of New York City, Phil spent the next 2 years
      cycling around Europe as a bike nomad, fundraising 100,000 trees with
      various charities, and pushing people to get their carbon footprint as low
      as possible. Protect Earth was a logical extension of those goals, as Phil
      now cycles from site to site, putting up fences, weeding, planting trees,
      then off on the bike to the next one.

  - name: Andy Herd
    role: Trustee
    image: /team-andy.jpg
    imageAlt: ''
    bio: |
      Andy is a software engineer based in West Lothian, Scotland.

      Prior to Protect Earth he coordinated a whitewater canoe slalom
      competition for many years and also volunteered with Livingston Round
      Table, helping to raise £100,000 for local charities and good causes.

      He enjoys spending time enjoying the great British outdoors and he's
      passionate about fighting climate change to ensure that future generations
      can continue to enjoy this beautiful planet.

  - name: Julian Cheal
    role: Trustee
    image: /team-julian.png
    imageAlt: ''
    bio: |
      Julian is a software engineer based in Bath, England. Originally hailing from
      the Welsh Valleys. He enjoys making and playing music and if the weather is nice
      running and cycling. At home he has an Air Source Heat Pump, and is looking at installing
      Solar and battery storage to help reduce his climate impact.

      As a trustee he helps the charity navigate the tech landscape to help make sure it is
      using technology as effiecntly as it can. He also enjoys visting Protect Earth sites
      helping with odd jobs and keeping the tea flowing.

  - name: Steve Wiltshire
    role: Ecologist
    image: /team-steve.jpg
    imageAlt: ''
    bio: |
      Steve has been fascinated with the natural world since childhood. He has
      worked in nature conservation for 15 years with organisations such as the
      Royal Society for the Protection of Birds, The Wildlife Trusts and Natural
      England. He enjoys reading and writing about wildlife, and has written
      numerous articles for 'Birdwatching' magazine. Steve currently lives in
      rural Herefordshire where he enjoys looking for butterflies, dragonflies,
      and birds… often accompanied by his Jack Russell 'Stanley Kubrick.'

  - name: Kathy Sturgeon
    role: Events Coordinator
    image: /team-kathy.jpg
    imageAlt: ''
    bio: |
      Kathy is a retired primary school teacher who was her school's
      environmental education subject leader. As a Brownie Guider and pack
      holiday advisor for many years Kathy was able to share her love of nature
      outside the school environment too. Nowadays, when she is not enjoying her
      own garden and family time, she volunteers with Protect Earth as Events
      Organiser.
  - name: Michael Cunningham
    role: Project Manager
    image: /team-michael.jpg
    imageAlt: ''
    bio: |
      Michael brings hands-on expertise and a strong track record in
      conservation to Protect Earth. With a BSc (Hons) in Countryside and
      Wildlife Conservation, chainsaw certification, and PADI Rescue Diver
      training, he's well-equipped to support our growing network of planting
      and maintenance projects. Originally from Radnorshire between Builth Wells
      and Hay-on-Wye, Michael has worked in the environmental sector since 2006
      with organisations including the Wildlife Trust, RSPB, and Environment
      Agency.

      Michael is passionate about woodland management and excited to follow
      projects from inception to completion. When he's not ensuring landowners
      and new sites feel supported and well taken care of, you'll find him wild
      swimming. He swam the Dart 10k and is raising money for conservation
      causes. His favourite species is the Hazel, not just for its coppicing
      uses but for the endangered Hazel dormouse it supports.
